<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MangoPanel Admin</title>
    <link id="theme-style" rel="stylesheet" href="/assets/Default.css">
    <link rel="stylesheet" href="/assets/app.css">
    <script>
      (function() {
        var t = localStorage.getItem("mp_theme") || "Default";
        document.getElementById("theme-style").setAttribute("href", "/assets/" + t + ".css");
      })();
    </script>
  </head>
  <body>
    <div id="admin-app" class="app-shell admin-shell" v-cloak>
      <aside class="sidebar admin-sidebar" v-if="token">
        <div class="brand">
          <span class="brand-mark">M</span>
          <div>
            <strong>MangoPanel</strong>
            <small>Admin panel</small>
          </div>
        </div>
        <nav class="nav-list">
          <div v-for="section in sidebarSections" :key="section.label" class="nav-section">
            <span class="nav-group">{{ section.label }}</span>
            <button v-for="item in section.items" :key="item.target" :class="{ active: activePage === item.target }" @click="goTo(item.target)">
              <span>{{ item.label }}</span>
            </button>
          </div>
          <div class="nav-section">
            <span class="nav-group">Links</span>
            <a href="/admin/setup">Setup</a>
            <a href="/status">Public Status</a>
          </div>
        </nav>
      </aside>

      <main class="main admin-main" :class="{ 'admin-main-auth': !token }">
        <header v-if="token" class="topbar">
          <div class="topbar-context">
            <div class="topbar-page-icon admin-page-glyph">
              {{ activeMenuItem.label.slice(0, 1) }}
            </div>
            <div class="topbar-page-meta">
              <span class="topbar-page-title-row">
                <span class="topbar-page-title">{{ activeMenuItem.label }}</span>
                <span class="feature-status-badge feature-status-functional">Admin</span>
              </span>
              <span class="topbar-page-desc">{{ activeMenuItem.description }}</span>
            </div>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" @click="logout">Sign out</button>
          </div>
        </header>

        <section v-if="!token" class="panel auth-panel">
          <h2>Admin Sign In</h2>
          <form v-if="!challengeToken" class="form-grid" @submit.prevent="startLogin">
            <label>Email <input v-model="login.email" autocomplete="username"></label>
            <label>Password <input v-model="login.password" type="password" autocomplete="current-password"></label>
            <button class="primary-button" type="submit">Continue</button>
          </form>
          <form v-else class="form-grid" @submit.prevent="finishLogin">
            <label>TOTP code <input v-model="login.code" inputmode="numeric" autocomplete="one-time-code"></label>
            <button class="primary-button" type="submit">Verify</button>
            <p class="muted">Development seed accepts code <code>000000</code>.</p>
          </form>
          <div v-if="message" class="admin-alert" role="alert">
            <p class="message">{{ message }}</p>
            <button class="alert-dismiss" type="button" aria-label="Dismiss alert" @click="dismissMessage">×</button>
          </div>
        </section>

        <template v-else>
          <div class="client-main-content admin-main-content">
            <section v-if="activePage === 'overview'" class="page-stack">
              <div class="metric-grid">
                <div class="metric">
                  <span>Users</span>
                  <strong>{{ dashboard.counts.users }}</strong>
                  <small>customer records</small>
                </div>
                <div class="metric">
                  <span>Accounts</span>
                  <strong>{{ dashboard.counts.hosting_accounts }}</strong>
                  <small>hosting stacks</small>
                </div>
                <div class="metric">
                  <span>Websites</span>
                  <strong>{{ dashboard.counts.websites }}</strong>
                  <small>routed domains</small>
                </div>
                <div class="metric">
                  <span>Stacks</span>
                  <strong>{{ dashboard.counts.account_stacks }}</strong>
                  <small>generated account compose files</small>
                </div>
                <div class="metric">
                  <span>Incidents</span>
                  <strong>{{ dashboard.counts.open_incidents }}</strong>
                  <small>currently open</small>
                </div>
              </div>

              <div class="two-column">
                <div class="panel">
                  <div class="section-head">
                    <div>
                      <h2>Nodes</h2>
                      <p>Agent and quota state</p>
                    </div>
                  </div>
                  <ul class="clean-list">
                    <li v-for="node in dashboard.nodes" :key="node.id">
                      <strong>{{ node.name }}</strong>
                      <span class="pill">{{ node.status }}</span>
                      <small>{{ node.hostname }} · {{ node.quota_backend }}</small>
                    </li>
                  </ul>
                </div>

                <div class="panel">
                  <h2>Public Status</h2>
                  <p class="status-line" :class="dashboard.status.overall_status">{{ statusLabel(dashboard.status.overall_status) }}</p>
                  <ul class="clean-list">
                    <li v-for="component in dashboard.status.components.slice(0, 6)" :key="component.id">
                      <strong>{{ component.name }}</strong>
                      <span class="pill">{{ component.status }}</span>
                    </li>
                  </ul>
                </div>
              </div>
            </section>

          <section v-if="activePage === 'clients'" class="panel">
            <div class="section-head">
              <div>
                <h2>Clients</h2>
                <p>Manage customer access, hosting account status, and assigned plans.</p>
              </div>
              <button class="primary-button" @click="openClientModal">Create Client</button>
            </div>
            <div class="client-selector">
              <label>Find client
                <select v-model="selectedClientId" aria-label="Select client to manage">
                  <option value="">All clients</option>
                  <option v-for="client in clients" :key="client.id" :value="client.id">
                    {{ client.full_name || client.email }} — {{ client.email }} (#{{ client.id }})
                  </option>
                </select>
              </label>
              <small class="muted">Click the dropdown and type to search by name or email.</small>
            </div>
            <div class="table-wrap">
              <table class="client-table">
                <thead>
                  <tr>
                    <th>Client</th>
                    <th>Status</th>
                    <th>Hosting Accounts</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="client in managedClients" :key="client.id">
                    <td>
                      <div class="client-edit">
                        <input v-model="client.edit.full_name" placeholder="Full name">
                        <input v-model="client.edit.email" placeholder="client@example.com">
                      </div>
                      <small>#{{ client.id }} · {{ client.created_at }}</small>
                    </td>
                    <td>
                      <select v-model="client.edit.status">
                        <option value="active">Active</option>
                        <option value="suspended">Suspended</option>
                      </select>
                    </td>
                    <td>
                      <div v-for="account in client.accounts" :key="account.id" class="account-manage-row">
                        <div>
                          <strong>{{ account.username }}</strong>
                          <span class="pill">{{ account.status }}</span>
                          <small>{{ account.website_count }} sites · {{ account.database_count }} DB · {{ account.backup_count }} backups</small>
                        </div>
                        <select v-model.number="account.selected_plan_id">
                          <option v-for="plan in plans" :key="plan.id" :value="plan.id">{{ plan.name }}</option>
                        </select>
                        <button @click="changeAccountPlan(client, account)" :disabled="Number(account.selected_plan_id) === Number(account.plan_id)">Update Plan</button>
                        <button @click="toggleAccountStatus(client, account)">{{ account.status === "suspended" ? "Unsuspend" : "Suspend" }}</button>
                      </div>
                    </td>
                    <td class="client-actions">
                      <button class="primary-button" @click="updateClient(client)">Save</button>
                      <button @click="loginAsClient(client)" :disabled="client.status !== 'active'">Login as Client</button>
                      <button class="danger-button" @click="deleteClient(client)">Delete</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section v-if="activePage === 'plans'" class="panel">
            <div class="section-head">
              <div>
                <h2>Hosting Plans</h2>
                <p>Create account plans for Docker resource limits, quotas, and backup retention.</p>
              </div>
              <button class="primary-button" @click="openPlanModal">Create Plan</button>
            </div>
            <div class="table-wrap plan-table">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Compute</th>
                    <th>Storage</th>
                    <th>Objects</th>
                    <th>Email</th>
                    <th>Backups</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="plan in plans" :key="plan.id">
                    <td><strong>{{ plan.name }}</strong><small>#{{ plan.id }}</small></td>
                    <td>{{ plan.cpu_limit }} CPU<small>{{ plan.memory_mb }} MB RAM</small></td>
                    <td>{{ plan.storage_mb }} MB<small>{{ plan.inode_limit }} inodes</small></td>
                    <td>{{ plan.max_websites }} sites<small>{{ plan.max_databases }} DB · {{ plan.max_mailboxes }} mail · {{ plan.max_cron_jobs }} cron</small></td>
                    <td>{{ plan.daily_email_limit }}/day</td>
                    <td>{{ plan.backup_retention_days }} days</td>
                    <td><button type="button" @click="editPlan(plan)">Edit</button></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <div v-if="showPlanModal" class="modal-overlay" @click.self="closePlanModal">
            <div class="modal-panel">
              <div class="modal-header">
                <h2>{{ editingPlanId ? 'Edit Hosting Plan' : 'Create Hosting Plan' }}</h2>
                <button class="close-button" type="button" aria-label="Close plan modal" @click="closePlanModal">×</button>
              </div>
              <div class="modal-body">
                <div class="plan-form">
                  <label>Plan name <input v-model="newPlan.name" placeholder="Starter 10 GB"></label>
                  <label>CPU cores <input v-model="newPlan.cpu_limit" inputmode="decimal" placeholder="1"></label>
                  <label>Memory MB <input v-model.number="newPlan.memory_mb" type="number" min="128"></label>
                  <label>Storage MB <input v-model.number="newPlan.storage_mb" type="number" min="100"></label>
                  <label>Inode limit <input v-model.number="newPlan.inode_limit" type="number" min="1000"></label>
                  <label>Websites <input v-model.number="newPlan.max_websites" type="number" min="1"></label>
                  <label>Databases <input v-model.number="newPlan.max_databases" type="number" min="0"></label>
                  <label>Mailboxes <input v-model.number="newPlan.max_mailboxes" type="number" min="0"></label>
                  <label>Cron jobs <input v-model.number="newPlan.max_cron_jobs" type="number" min="0"></label>
                  <label>Daily emails <input v-model.number="newPlan.daily_email_limit" type="number" min="0"></label>
                  <label>Backup retention days <input v-model.number="newPlan.backup_retention_days" type="number" min="1"></label>
                  <label>Max processes <input v-model.number="newPlan.max_processes" type="number" min="0"></label>
                  <label>PHP workers <input v-model.number="newPlan.php_workers" type="number" min="0"></label>
                  <label>Bandwidth MB (0 = unlimited) <input v-model.number="newPlan.bandwidth_mb" type="number" min="0"></label>
                  <label>Nameserver 1 <input v-model="newPlan.nameserver_1"></label>
                  <label>Nameserver 2 <input v-model="newPlan.nameserver_2"></label>
                  <label>Backup location <input v-model="newPlan.backup_location"></label>
                  <label>Frontend frameworks <input v-model="newPlan.frontend_frameworks"></label>
                  <label>Backend frameworks <input v-model="newPlan.backend_frameworks"></label>
                  <label>Node.js versions <input v-model="newPlan.nodejs_versions"></label>
                  <label>Package managers <input v-model="newPlan.package_managers"></label>
                  <label>DNS provider
                    <select v-model="newPlan.dns_default_provider">
                      <option value="local_powerdns">Local DNS</option>
                      <option value="cloudflare">Cloudflare</option>
                    </select>
                  </label>
                  <label v-if="newPlan.dns_default_provider === 'cloudflare'">
                    Cloudflare account
                    <select v-model.number="newPlan.dns_default_provider_account_id">
                      <option value="">— select account —</option>
                      <option v-for="acct in cloudflareAccounts()" :key="acct.id" :value="acct.id">
                        {{ acct.display_name }} ({{ acct.account_name || acct.external_account_id || 'no ID' }})
                      </option>
                    </select>
                    <small v-if="!cloudflareAccounts().length" style="color:var(--color-warning,#f59e0b)">No Cloudflare accounts configured — add one in DNS Settings first.</small>
                  </label>
                  <label>DNS records/domain <input v-model.number="newPlan.dns_max_records_per_domain" type="number" min="0"></label>
                  <label>Minimum DNS TTL <input v-model.number="newPlan.dns_min_ttl" type="number" min="60"></label>
                  <label v-if="editingPlanId" class="plan-account-update"><input v-model="applyPlanToExistingAccounts" type="checkbox"> Apply these changes to all existing accounts on this plan</label>
                </div>
              </div>
              <div class="modal-footer">
                <button class="ghost-button" type="button" @click="closePlanModal">Cancel</button>
                <button class="primary-button plan-submit" type="button" @click="editingPlanId ? updatePlan() : createPlan()">{{ editingPlanId ? 'Save Changes' : 'Create Plan' }}</button>
              </div>
            </div>
          </div>

          <section v-if="activePage === 'dns'" class="panel">
            <div class="section-head">
              <div>
                <h2>DNS Settings</h2>
                <p>Choose the default authoritative DNS provider and store provider credentials.</p>
              </div>
            </div>
            <div class="plan-form">
              <label>Global DNS mode
                <select v-model="dnsSettings.global_mode">
                  <option value="local_powerdns">Local DNS</option>
                  <option value="cloudflare">Cloudflare</option>
                </select>
              </label>
              <label>Nameserver 1 <input v-model="dnsSettings.local.nameservers[0]" placeholder="ns1.mango.test"></label>
              <label>Nameserver 2 <input v-model="dnsSettings.local.nameservers[1]" placeholder="ns2.mango.test"></label>
              <label>Public IPv4 <input v-model="dnsSettings.local.public_ipv4" placeholder="203.0.113.10"></label>
              <label>Public IPv6 <input v-model="dnsSettings.local.public_ipv6" placeholder="2001:db8::10"></label>
              <label>SOA email <input v-model="dnsSettings.local.soa_email" placeholder="hostmaster.example.com"></label>
              <label>Default TTL <input v-model.number="dnsSettings.local.default_ttl" type="number" min="60"></label>
              <button class="primary-button plan-submit" @click="saveDnsSettings">Save DNS Settings</button>
            </div>

            <div class="section-head" style="margin-top: 1.5rem;">
              <div>
                <h3>Cloudflare Accounts</h3>
                <p>Tokens are encrypted before storage and only used by agent/provider jobs.</p>
              </div>
            </div>
            <div class="plan-form">
              <label>Display name <input v-model="cloudflareAccount.display_name" placeholder="Main Cloudflare"></label>
              <label>Account name <input v-model="cloudflareAccount.account_name" placeholder="Acme Hosting"></label>
              <label>Account ID <input v-model="cloudflareAccount.external_account_id" placeholder="Optional until validation"></label>
              <label>API token <input v-model="cloudflareAccount.api_token" type="password" placeholder="Cloudflare API token"></label>
              <button class="primary-button plan-submit" @click="createCloudflareDnsAccount">Add Cloudflare Account</button>
            </div>

            <div class="table-wrap plan-table">
              <table>
                <thead>
                  <tr>
                    <th>Provider</th>
                    <th>Status</th>
                    <th>Capabilities</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="provider in dnsSettings.providers" :key="provider.id">
                    <td><strong>{{ provider.display_name }}</strong><small>{{ provider.key }}</small></td>
                    <td>{{ provider.status }}</td>
                    <td>
                      {{ (provider.capabilities.record_types || []).join(', ') }}
                      <small v-if="provider.capabilities.supports_proxy">Cloudflare proxy available</small>
                    </td>
                    <td><button @click="testDnsProvider(provider)">Test</button></td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="table-wrap plan-table" v-if="cloudflareAccounts().length">
              <table>
                <thead>
                  <tr>
                    <th>Cloudflare Account</th>
                    <th>Status</th>
                    <th>Secret</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="account in cloudflareAccounts()" :key="account.id">
                    <td><strong>{{ account.display_name }}</strong><small>{{ account.account_name || account.external_account_id }}</small></td>
                    <td>{{ account.status }}</td>
                    <td>{{ account.has_secret ? account.secret_label : 'missing' }}</td>
                    <td class="actions">
                      <button @click="testDnsProvider(dnsSettings.providers.find(p => p.key === 'cloudflare'), account)">Test</button>
                      <button class="danger-button" @click="deleteCloudflareDnsAccount(account)">Delete</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="section-head" style="margin-top: 1.5rem;">
              <div>
                <h3>Managed DNS Domains</h3>
                <p>Rebuild zones, verify delegation, export records, and migrate providers on the <a href="#dns-domains" @click.prevent="goTo('dns-domains')">Managed DNS Domains</a> tab.</p>
              </div>
            </div>
          </section>

          <section v-if="activePage === 'dns-domains'" class="panel">
            <div class="section-head">
              <div>
                <h2>Managed DNS Domains</h2>
                <p>Rebuild zones, verify delegation, export records, and migrate providers.</p>
              </div>
            </div>
            <div class="table-wrap plan-table">
              <table>
                <thead>
                  <tr>
                    <th>Domain</th>
                    <th>Provider</th>
                    <th>Status</th>
                    <th>Nameservers</th>
                    <th>Sync</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="domain in dnsDomains" :key="domain.id">
                    <td><strong>{{ domain.name }}</strong><small>{{ domain.owner_email }} · {{ domain.username }}</small></td>
                    <td>{{ providerLabel(domain.dns_provider) }}</td>
                    <td>
                      <span class="pill" :class="domain.dns_status">{{ domain.dns_status }}</span>
                      <small v-if="domain.dns_warnings && domain.dns_warnings.length">{{ domain.dns_warnings[0].message }}</small>
                    </td>
                    <td><small>{{ (domain.nameservers || []).join(', ') || 'pending provider sync' }}</small></td>
                    <td>
                      <span v-if="domain.latest_dns_job">#{{ domain.latest_dns_job.id }} {{ domain.latest_dns_job.status }}</span>
                      <span v-else>none</span>
                    </td>
                    <td class="actions">
                      <button @click="rebuildDnsDomain(domain)">Rebuild</button>
                      <button @click="verifyDnsDomain(domain)">Verify</button>
                      <button @click="exportDnsDomain(domain)">Export</button>
                      <button v-if="domain.dns_provider !== 'cloudflare'" @click="migrateDnsDomain(domain, 'cloudflare')">To Cloudflare</button>
                      <button v-if="domain.dns_provider !== 'local_powerdns'" @click="migrateDnsDomain(domain, 'local_powerdns')">To Local</button>
                    </td>
                  </tr>
                  <tr v-if="!dnsDomains.length"><td colspan="6" class="empty-row">No managed domains yet.</td></tr>
                </tbody>
              </table>
            </div>
          </section>

          <section v-if="activePage === 'admins'" class="panel">
            <div class="section-head">
              <div>
                <h2>PHP Versions</h2>
                <p>Global PHP versions allowed for client websites.</p>
              </div>
            </div>
            <div class="php-versions-grid">
              <span class="php-version-badge legacy">PHP 7.4</span>
              <span class="php-version-badge supported">PHP 8.0</span>
              <span class="php-version-badge supported">PHP 8.1</span>
              <span class="php-version-badge supported">PHP 8.2</span>
              <span class="php-version-badge supported">PHP 8.3</span>
              <span class="php-version-badge supported">PHP 8.4</span>
            </div>
            <p class="muted" style="margin-top: 1rem; font-size: 13px;">Clients can select their desired version from their dashboard per website. The default for new websites is 8.3.</p>
          </section>

          <section v-if="activePage === 'admins'" class="panel">
            <div class="section-head">
              <div>
                <h2>Admins</h2>
                <p>Create additional admin accounts after first setup.</p>
              </div>
            </div>
            <div class="incident-form admin-create-form">
              <input v-model="newAdmin.full_name" placeholder="Full name">
              <input v-model="newAdmin.email" placeholder="admin@example.com">
              <select v-model="newAdmin.role">
                <option value="support_admin">Support admin</option>
                <option value="system_admin">System admin</option>
                <option value="super_admin">Super admin</option>
              </select>
              <input v-model="newAdmin.password" type="password" placeholder="Temporary password">
              <button class="primary-button" @click="createAdmin">Add Admin</button>
            </div>
            <div v-if="newAdminSecret" class="secret-box">
              <span>New admin TOTP secret</span>
              <strong>{{ newAdminSecret }}</strong>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Email</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="admin in admins" :key="admin.id">
                    <td>{{ admin.email }}</td>
                    <td>{{ admin.full_name }}</td>
                    <td><span class="pill">{{ admin.role }}</span></td>
                    <td><span class="pill">{{ admin.status }}</span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section v-if="activePage === 'status'" class="panel">
            <div class="section-head">
              <div>
                <h2>Status Incident</h2>
                <p>Publish an incident to the public status page.</p>
              </div>
            </div>
            <div class="incident-form">
              <input v-model="incident.title" placeholder="Incident title">
              <select v-model="incident.severity">
                <option value="minor">Minor</option>
                <option value="major">Major</option>
                <option value="critical">Critical</option>
              </select>
              <input v-model="incident.message" placeholder="Initial update">
              <button class="primary-button" @click="createIncident">Publish</button>
            </div>
          </section>

          <section v-if="activePage === 'system'" class="panel">
            <div class="section-head">
              <div>
                <h2>Account Stacks</h2>
                <p>Generated node-agent stack state.</p>
              </div>
              <button @click="runAgent">Run Agent</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Account</th>
                    <th>Status</th>
                    <th>Mode</th>
                    <th>Compose</th>
                    <th>Services</th>
                    <th>Generated</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="stack in stacks" :key="stack.id">
                    <td><strong>{{ stack.username }}</strong><small>{{ stack.account_status }}</small></td>
                    <td><span class="pill">{{ stack.status }}</span></td>
                    <td>{{ stack.mode }}</td>
                    <td><small>{{ stack.compose_path }}</small></td>
                    <td>
                      <div class="service-links">
                        <a :href="stack.runtime.web_url" target="_blank" rel="noreferrer">web</a>
                        <a :href="stack.runtime.filebrowser_url" target="_blank" rel="noreferrer">files</a>
                        <a :href="stack.runtime.phpmyadmin_url" target="_blank" rel="noreferrer">db</a>
                        <a :href="`http://${stack.runtime.mail_host}`" target="_blank" rel="noreferrer">mail</a>
                      </div>
                    </td>
                    <td>{{ stack.generated_at }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section v-if="activePage === 'system'" class="panel">
            <h2>Recent Jobs</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Target</th>
                    <th>Updated</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="job in dashboard.recent_jobs" :key="job.id">
                    <td>{{ job.id }}</td>
                    <td>{{ job.type }}</td>
                    <td><span class="pill">{{ job.status }}</span></td>
                    <td>{{ job.target_type }} #{{ job.target_id }}</td>
                    <td>{{ job.updated_at }}</td>
                    <td>
                      <button v-if="['failed','queued'].includes(job.status)" @click="retryJob(job)">Retry</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section v-if="activePage === 'clients'" class="panel">
            <div class="section-head">
              <div>
                <h2>Create Hosting Account</h2>
                <p>Provision a new account for an existing client.</p>
              </div>
            </div>
            <div class="plan-form">
              <label>Client
                <select v-model.number="newAccount.user_id">
                  <option value="" disabled>Select client</option>
                  <option v-for="client in clients" :key="client.id" :value="client.id">{{ client.full_name || client.email }} (#{{ client.id }})</option>
                </select>
              </label>
              <label>Plan
                <select v-model.number="newAccount.plan_id">
                  <option value="" disabled>Select plan</option>
                  <option v-for="plan in plans" :key="plan.id" :value="plan.id">{{ plan.name }}</option>
                </select>
              </label>
              <label>Node
                <select v-model.number="newAccount.node_id">
                  <option value="" disabled>Select node</option>
                  <option v-for="node in dashboard.nodes" :key="node.id" :value="node.id">{{ node.name }}</option>
                </select>
              </label>
              <button class="primary-button plan-submit" @click="createHostingAccount" :disabled="!newAccount.user_id || !newAccount.plan_id || !newAccount.node_id">Provision Account</button>
            </div>
          </section>

          <section v-if="activePage === 'admins'" class="panel">
            <div class="section-head">
              <div>
                <h2>Register Node</h2>
                <p>Add a new hosting node to the cluster.</p>
              </div>
            </div>
            <div class="incident-form admin-create-form">
              <input v-model="newNode.name" placeholder="node-01">
              <input v-model="newNode.hostname" placeholder="node01.example.com">
              <select v-model="newNode.quota_backend">
                <option value="dev-simulator">dev-simulator (macOS)</option>
                <option value="xfs">XFS (Linux)</option>
                <option value="zfs">ZFS (Linux)</option>
                <option value="btrfs">Btrfs (Linux)</option>
              </select>
              <button class="primary-button" @click="registerNode">Register Node</button>
            </div>
          </section>

          <section v-if="activePage === 'system'" class="panel">
            <h2>Agent Events</h2>
            <ul class="clean-list">
              <li v-for="event in jobEvents.slice(0, 8)" :key="event.id">
                <strong>#{{ event.job_id }} {{ event.message }}</strong>
                <span class="pill">{{ event.level }}</span>
                <small>{{ event.created_at }}</small>
              </li>
            </ul>
          </section>

          <div v-if="message" class="admin-alert" role="alert">
            <p class="message">{{ message }}</p>
            <button class="alert-dismiss" type="button" aria-label="Dismiss alert" @click="dismissMessage">×</button>
          </div>

          <div v-if="showClientModal" class="modal-overlay" @click.self="closeClientModal">
            <div class="modal-panel">
              <div class="modal-header">
                <h2>Create Client</h2>
                <button class="close-button" type="button" aria-label="Close client modal" @click="closeClientModal">×</button>
              </div>
              <div class="modal-body">
                <form class="form-grid" @submit.prevent="createClient">
                  <label>Full name<input v-model="newClient.full_name" autocomplete="name" required></label>
                  <label>Email<input v-model="newClient.email" type="email" autocomplete="email" required></label>
                  <label>Temporary password<input v-model="newClient.password" type="password" autocomplete="new-password" required></label>
                  <div class="modal-footer">
                    <button type="button" @click="closeClientModal">Cancel</button>
                    <button class="primary-button" type="submit">Create Client</button>
                  </div>
                </form>
                <div v-if="newClientSecret" class="secret-box">
                  <span>Client TOTP secret — share securely</span>
                  <strong>{{ newClientSecret }}</strong>
                </div>
              </div>
            </div>
          </div>
          </div>
        </template>
      </main>
    </div>

    <script src="/assets/vue.global.prod.js"></script>
    <script src="/assets/admin.js"></script>
  </body>
</html>
