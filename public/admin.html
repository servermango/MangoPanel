<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MangoPanel Admin</title>
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body>
    <div id="admin-app" class="app-shell" v-cloak>
      <aside class="sidebar admin-sidebar">
        <div class="brand">
          <span class="brand-mark">M</span>
          <div>
            <strong>MangoPanel</strong>
            <small>Admin panel</small>
          </div>
        </div>
        <nav class="nav-list">
          <a class="active" href="/admin">Admin</a>
          <a href="#clients">Clients</a>
          <a href="#plans">Plans</a>
          <a href="/admin/setup">Setup</a>
          <a href="/status">Status</a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1>Operations</h1>
            <p>Provision accounts, watch jobs, and publish status events.</p>
          </div>
          <button v-if="token" class="ghost-button" @click="logout">Sign out</button>
        </header>

        <section v-if="!token" class="panel auth-panel">
          <h2>Admin Sign In</h2>
          <div v-if="!challengeToken" class="form-grid">
            <label>Email <input v-model="login.email" autocomplete="username"></label>
            <label>Password <input v-model="login.password" type="password" autocomplete="current-password"></label>
            <button class="primary-button" @click="startLogin">Continue</button>
          </div>
          <div v-else class="form-grid">
            <label>TOTP code <input v-model="login.code" inputmode="numeric" autocomplete="one-time-code"></label>
            <button class="primary-button" @click="finishLogin">Verify</button>
            <p class="muted">Development seed accepts code <code>000000</code>.</p>
          </div>
          <p v-if="message" class="message">{{ message }}</p>
        </section>

        <template v-else>
          <section class="metric-grid">
            <div class="metric">
              <span>Users</span>
              <strong>{{ dashboard.counts.users }}</strong>
              <small>customer records</small>
            </div>
            <div class="metric">
              <span>Accounts</span>
              <strong>{{ dashboard.counts.hosting_accounts }}</strong>
              <small>hosting stacks</small>
            </div>
            <div class="metric">
              <span>Websites</span>
              <strong>{{ dashboard.counts.websites }}</strong>
              <small>routed domains</small>
            </div>
            <div class="metric">
              <span>Stacks</span>
              <strong>{{ dashboard.counts.account_stacks }}</strong>
              <small>generated account compose files</small>
            </div>
            <div class="metric">
              <span>Incidents</span>
              <strong>{{ dashboard.counts.open_incidents }}</strong>
              <small>currently open</small>
            </div>
          </section>

          <section class="two-column">
            <div class="panel">
              <div class="section-head">
                <div>
                  <h2>Nodes</h2>
                  <p>Agent and quota state</p>
                </div>
              </div>
              <ul class="clean-list">
                <li v-for="node in dashboard.nodes" :key="node.id">
                  <strong>{{ node.name }}</strong>
                  <span class="pill">{{ node.status }}</span>
                  <small>{{ node.hostname }} · {{ node.quota_backend }}</small>
                </li>
              </ul>
            </div>

            <div class="panel">
              <h2>Public Status</h2>
              <p class="status-line" :class="dashboard.status.overall_status">{{ statusLabel(dashboard.status.overall_status) }}</p>
              <ul class="clean-list">
                <li v-for="component in dashboard.status.components.slice(0, 6)" :key="component.id">
                  <strong>{{ component.name }}</strong>
                  <span class="pill">{{ component.status }}</span>
                </li>
              </ul>
            </div>
          </section>

          <section id="clients" class="panel anchor-panel">
            <div class="section-head">
              <div>
                <h2>Clients</h2>
                <p>Manage customer access, hosting account status, and assigned plans.</p>
              </div>
            </div>
            <div class="table-wrap">
              <table class="client-table">
                <thead>
                  <tr>
                    <th>Client</th>
                    <th>Status</th>
                    <th>Hosting Accounts</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="client in clients" :key="client.id">
                    <td>
                      <div class="client-edit">
                        <input v-model="client.edit.full_name" placeholder="Full name">
                        <input v-model="client.edit.email" placeholder="client@example.com">
                      </div>
                      <small>#{{ client.id }} · {{ client.created_at }}</small>
                    </td>
                    <td>
                      <select v-model="client.edit.status">
                        <option value="active">Active</option>
                        <option value="suspended">Suspended</option>
                      </select>
                    </td>
                    <td>
                      <div v-for="account in client.accounts" :key="account.id" class="account-manage-row">
                        <div>
                          <strong>{{ account.username }}</strong>
                          <span class="pill">{{ account.status }}</span>
                          <small>{{ account.website_count }} sites · {{ account.database_count }} DB · {{ account.backup_count }} backups</small>
                        </div>
                        <select v-model.number="account.selected_plan_id">
                          <option v-for="plan in plans" :key="plan.id" :value="plan.id">{{ plan.name }}</option>
                        </select>
                        <button @click="changeAccountPlan(client, account)" :disabled="Number(account.selected_plan_id) === Number(account.plan_id)">Update Plan</button>
                        <button @click="toggleAccountStatus(client, account)">{{ account.status === "suspended" ? "Unsuspend" : "Suspend" }}</button>
                      </div>
                    </td>
                    <td class="client-actions">
                      <button class="primary-button" @click="updateClient(client)">Save</button>
                      <button class="danger-button" @click="deleteClient(client)">Delete</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section id="plans" class="panel anchor-panel">
            <div class="section-head">
              <div>
                <h2>Hosting Plans</h2>
                <p>Create account plans for Docker resource limits, quotas, and backup retention.</p>
              </div>
            </div>
            <div class="plan-form">
              <label>Plan name <input v-model="newPlan.name" placeholder="Starter 10 GB"></label>
              <label>CPU cores <input v-model="newPlan.cpu_limit" inputmode="decimal" placeholder="1"></label>
              <label>Memory MB <input v-model.number="newPlan.memory_mb" type="number" min="128"></label>
              <label>Storage MB <input v-model.number="newPlan.storage_mb" type="number" min="100"></label>
              <label>Inode limit <input v-model.number="newPlan.inode_limit" type="number" min="1000"></label>
              <label>Websites <input v-model.number="newPlan.max_websites" type="number" min="1"></label>
              <label>Databases <input v-model.number="newPlan.max_databases" type="number" min="0"></label>
              <label>Mailboxes <input v-model.number="newPlan.max_mailboxes" type="number" min="0"></label>
              <label>Cron jobs <input v-model.number="newPlan.max_cron_jobs" type="number" min="0"></label>
              <label>Daily emails <input v-model.number="newPlan.daily_email_limit" type="number" min="0"></label>
              <label>Backup retention days <input v-model.number="newPlan.backup_retention_days" type="number" min="1"></label>
              <button class="primary-button plan-submit" @click="createPlan">Create Plan</button>
            </div>
            <div class="table-wrap plan-table">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Compute</th>
                    <th>Storage</th>
                    <th>Objects</th>
                    <th>Email</th>
                    <th>Backups</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="plan in plans" :key="plan.id">
                    <td><strong>{{ plan.name }}</strong><small>#{{ plan.id }}</small></td>
                    <td>{{ plan.cpu_limit }} CPU<small>{{ plan.memory_mb }} MB RAM</small></td>
                    <td>{{ plan.storage_mb }} MB<small>{{ plan.inode_limit }} inodes</small></td>
                    <td>{{ plan.max_websites }} sites<small>{{ plan.max_databases }} DB · {{ plan.max_mailboxes }} mail · {{ plan.max_cron_jobs }} cron</small></td>
                    <td>{{ plan.daily_email_limit }}/day</td>
                    <td>{{ plan.backup_retention_days }} days</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>PHP Versions</h2>
                <p>Global PHP versions allowed for client websites.</p>
              </div>
            </div>
            <div class="php-versions-grid">
              <span class="php-version-badge legacy">PHP 7.4</span>
              <span class="php-version-badge supported">PHP 8.0</span>
              <span class="php-version-badge supported">PHP 8.1</span>
              <span class="php-version-badge supported">PHP 8.2</span>
              <span class="php-version-badge supported">PHP 8.3</span>
              <span class="php-version-badge supported">PHP 8.4</span>
            </div>
            <p class="muted" style="margin-top: 1rem; font-size: 13px;">Clients can select their desired version from their dashboard per website. The default for new websites is 8.3.</p>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>Admins</h2>
                <p>Create additional admin accounts after first setup.</p>
              </div>
            </div>
            <div class="incident-form admin-create-form">
              <input v-model="newAdmin.full_name" placeholder="Full name">
              <input v-model="newAdmin.email" placeholder="admin@example.com">
              <select v-model="newAdmin.role">
                <option value="support_admin">Support admin</option>
                <option value="system_admin">System admin</option>
                <option value="super_admin">Super admin</option>
              </select>
              <input v-model="newAdmin.password" type="password" placeholder="Temporary password">
              <button class="primary-button" @click="createAdmin">Add Admin</button>
            </div>
            <div v-if="newAdminSecret" class="secret-box">
              <span>New admin TOTP secret</span>
              <strong>{{ newAdminSecret }}</strong>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Email</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="admin in admins" :key="admin.id">
                    <td>{{ admin.email }}</td>
                    <td>{{ admin.full_name }}</td>
                    <td><span class="pill">{{ admin.role }}</span></td>
                    <td><span class="pill">{{ admin.status }}</span></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>Status Incident</h2>
                <p>Publish an incident to the public status page.</p>
              </div>
            </div>
            <div class="incident-form">
              <input v-model="incident.title" placeholder="Incident title">
              <select v-model="incident.severity">
                <option value="minor">Minor</option>
                <option value="major">Major</option>
                <option value="critical">Critical</option>
              </select>
              <input v-model="incident.message" placeholder="Initial update">
              <button class="primary-button" @click="createIncident">Publish</button>
            </div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>Account Stacks</h2>
                <p>Generated node-agent stack state.</p>
              </div>
              <button @click="runAgent">Run Agent</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Account</th>
                    <th>Status</th>
                    <th>Mode</th>
                    <th>Compose</th>
                    <th>Services</th>
                    <th>Generated</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="stack in stacks" :key="stack.id">
                    <td><strong>{{ stack.username }}</strong><small>{{ stack.account_status }}</small></td>
                    <td><span class="pill">{{ stack.status }}</span></td>
                    <td>{{ stack.mode }}</td>
                    <td><small>{{ stack.compose_path }}</small></td>
                    <td>
                      <div class="service-links">
                        <a :href="stack.runtime.web_url" target="_blank" rel="noreferrer">web</a>
                        <a :href="stack.runtime.filebrowser_url" target="_blank" rel="noreferrer">files</a>
                        <a :href="stack.runtime.phpmyadmin_url" target="_blank" rel="noreferrer">db</a>
                        <a :href="`http://${stack.runtime.mail_host}`" target="_blank" rel="noreferrer">mail</a>
                      </div>
                    </td>
                    <td>{{ stack.generated_at }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="panel">
            <h2>Recent Jobs</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Target</th>
                    <th>Updated</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="job in dashboard.recent_jobs" :key="job.id">
                    <td>{{ job.id }}</td>
                    <td>{{ job.type }}</td>
                    <td><span class="pill">{{ job.status }}</span></td>
                    <td>{{ job.target_type }} #{{ job.target_id }}</td>
                    <td>{{ job.updated_at }}</td>
                    <td>
                      <button v-if="['failed','queued'].includes(job.status)" @click="retryJob(job)">Retry</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>Create Hosting Account</h2>
                <p>Provision a new account for an existing client.</p>
              </div>
            </div>
            <div class="plan-form">
              <label>Client
                <select v-model.number="newAccount.user_id">
                  <option value="" disabled>Select client</option>
                  <option v-for="client in clients" :key="client.id" :value="client.id">{{ client.full_name || client.email }} (#{{ client.id }})</option>
                </select>
              </label>
              <label>Plan
                <select v-model.number="newAccount.plan_id">
                  <option value="" disabled>Select plan</option>
                  <option v-for="plan in plans" :key="plan.id" :value="plan.id">{{ plan.name }}</option>
                </select>
              </label>
              <label>Node
                <select v-model.number="newAccount.node_id">
                  <option value="" disabled>Select node</option>
                  <option v-for="node in dashboard.nodes" :key="node.id" :value="node.id">{{ node.name }}</option>
                </select>
              </label>
              <button class="primary-button plan-submit" @click="createHostingAccount" :disabled="!newAccount.user_id || !newAccount.plan_id || !newAccount.node_id">Provision Account</button>
            </div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <h2>Register Node</h2>
                <p>Add a new hosting node to the cluster.</p>
              </div>
            </div>
            <div class="incident-form admin-create-form">
              <input v-model="newNode.name" placeholder="node-01">
              <input v-model="newNode.hostname" placeholder="node01.example.com">
              <select v-model="newNode.quota_backend">
                <option value="dev-simulator">dev-simulator (macOS)</option>
                <option value="xfs">XFS (Linux)</option>
                <option value="zfs">ZFS (Linux)</option>
                <option value="btrfs">Btrfs (Linux)</option>
              </select>
              <button class="primary-button" @click="registerNode">Register Node</button>
            </div>
          </section>

          <section class="panel">
            <h2>Agent Events</h2>
            <ul class="clean-list">
              <li v-for="event in jobEvents.slice(0, 8)" :key="event.id">
                <strong>#{{ event.job_id }} {{ event.message }}</strong>
                <span class="pill">{{ event.level }}</span>
                <small>{{ event.created_at }}</small>
              </li>
            </ul>
          </section>

          <p v-if="message" class="message">{{ message }}</p>
        </template>
      </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/assets/admin.js"></script>
  </body>
</html>
